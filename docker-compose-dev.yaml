x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1-python3.11
  env_file:
    - .env
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${AIRFLOW_DB}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth'
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
    # Connexions Minio / S3
    AIRFLOW_CONN_MINIO_DEFAULT: s3://${DATALAKE_USER}:${DATALAKE_PASSWORD}@minio:9000
    # Variables Airflow accessibles dans les DAGs
    MINIO_ENDPOINT: http://minio:9000
    MINIO_ACCESS_KEY: ${DATALAKE_USER}
    MINIO_SECRET_KEY: ${DATALAKE_PASSWORD}
    OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY}
    POSTGRES_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    # PySpark / Java
    JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
    SPARK_HOME: /opt/spark
    PYTHONPATH: /opt/airflow/dags:/opt/airflow/scripts
  volumes:
    - ./airflow/dags:/opt/airflow/dags          # DAGs persistés en local
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./airflow/scripts:/opt/airflow/scripts    # Scripts Python de collecte
    - ./airflow/config:/opt/airflow/config
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - data-net


services:
  # ─────────────────────────────────────────────
  #  DATALAKE (minio)
  # ─────────────────────────────────────────────
  minio:
    image: minio/minio
    container_name: minio
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${DATALAKE_USER}
      MINIO_ROOT_PASSWORD: ${DATALAKE_PASSWORD}
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console Web
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    networks:
      - data-net

  # Initialise les buckets Minio au démarrage
  minio-init:
    image: minio/mc
    container_name: minio_init
    env_file:
      - .env
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${DATALAKE_USER} $${DATALAKE_PASSWORD};
      mc mb --ignore-existing local/raw-taxi;
      mc mb --ignore-existing local/raw-weather;
      mc mb --ignore-existing local/raw-weather-fake;
      mc mb --ignore-existing local/processed;
      echo 'Buckets créés avec succès';
      exit 0;
      "
    networks:
      - data-net

  # ─────────────────────────────────────────────
  #  DWH BDD SQL
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: postgres_dwh
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB} # Ajouter db sur l'analytic pour dbt
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      retries: 5
      start_period: 30s
    ports:
      - "5434:5432"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d  # scripts SQL d'init (multi-DB)
    networks:
      - data-net

  # ─────────────────────────────────────────────
  #  Marimo analytique
  # ─────────────────────────────────────────────
  marimo:
    build:
      context: ./marimo-analytics
    env_file:
      - .env.local
    container_name: marimo-analytics
    command: marimo edit --no-token --host 0.0.0.0 -p 8080
    volumes:
      - ./marimo-analytics/scripts:/code/scripts
    working_dir: /code
    ports:
      - "8080:8080"
    stdin_open: true
    tty: true

  # Service dbt (conteneur gardé allumé exprès pour lancer les différents modèles dbt)
  dbt:
    build:
      context: ./dbt
    env_file:
      - .env
    working_dir: /dbt
    volumes:
      - ./dbt:/dbt                        # Projet dbt persisté en local
      - ./dbt/profiles:/root/.dbt         # profiles.yml persisté en local
    environment:
      DBT_PROFILES_DIR: /root/.dbt
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Conteneur gardé ouvert pour lancer les commandes manuellement
    entrypoint: ["tail", "-f", "/dev/null"]
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    networks:
      - data-net

  # Service airflow (Pyspark et Pyspark Streaming qui doit être installée et configuré)
  # ─────────────────────────────────────────────
  #  AIRFLOW
  # ─────────────────────────────────────────────

  airflow-init:
    <<: *airflow-common
    container_name: airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        pip install --no-cache-dir \
          apache-airflow-providers-amazon \
          apache-airflow-providers-postgres \
          boto3 requests pyarrow pandas \
          pyspark==3.5.1 \
          kafka-python confluent-kafka 
        airflow db migrate
        airflow users create \
          --username ${AIRFLOW_ADMIN_USER:-admin} \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email ${AIRFLOW_ADMIN_EMAIL:-admin@local.dev} \
          --password ${AIRFLOW_ADMIN_PASSWORD:-admin} || true
    environment:
      <<: *airflow-common-env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - data-net

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow_webserver
    command: >
      bash -c "pip install --no-cache-dir apache-airflow-providers-amazon apache-airflow-providers-postgres boto3 requests pyarrow pandas pyspark==3.5.1 kafka-python confluent-kafka && airflow webserver"
    ports:
      - "8082:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    networks:
      - data-net

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler
    command: >
      bash -c "pip install --no-cache-dir apache-airflow-providers-amazon apache-airflow-providers-postgres boto3 requests pyarrow pandas pyspark==3.5.1 kafka-python confluent-kafka && airflow scheduler"
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname $(hostname)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2G
    networks:
      - data-net

  # ─────────────────────────────────────────────
  #  KAFKA (pour le streaming météo)
  # ─────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    networks:
      - data-net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:29092 --list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    networks:
      - data-net

  # Interface Kafka (optionnel mais pratique)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka_ui
    depends_on:
      - kafka
    ports:
      - "8083:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M
    networks:
      - data-net

# ─────────────────────────────────────────────
#  VOLUMES (persistance locale + Docker volumes)
# ─────────────────────────────────────────────

volumes:
  postgres_data:
  minio_data:
  kafka_data:
  zookeeper_data:
  zookeeper_log:

# ─────────────────────────────────────────────
#  RÉSEAU INTERNE
# ─────────────────────────────────────────────

networks:
  data-net:
    driver: bridge
